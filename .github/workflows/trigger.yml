name: Trigger Build in Repo B
on:
  push:
    branches:
      - main 
jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: 呼叫仓库B干活
        run: |
          curl -X POST https://api.github.com/repos/yjyyoyo/yjyyoyo.github.io/dispatches \
          -H "Accept: application/vnd.github.v3+json" \
          -H "Authorization: token ${{ secrets.PAT_TOKEN }}" \
          --data '{"event_type": "trigger-build"}'
